name: Build KVM Kernel for A51
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Build Environment
        run: |
          sudo apt update
          sudo apt install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z-dev ccache libgl1-mesa-dev libxml2-utils xsltproc unzip bc python3

      - name: Pull Source and Toolchain
        run: |
          git clone --depth=1 https://github.com/ianmacd/a51xx source
          git clone --depth=1 https://github.com/mvaisakh/gcc-arm64 toolchain

      - name: Enable KVM Support
        run: |
          cd source
          # Injecting KVM configs into the default A51 config
          echo "CONFIG_KVM=y" >> arch/arm64/configs/exynos9611-a51_defconfig
          echo "CONFIG_VIRTUALIZATION=y" >> arch/arm64/configs/exynos9611-a51_defconfig
          echo "CONFIG_KVM_ARM_HOST=y" >> arch/arm64/configs/exynos9611-a51_defconfig

      - name: Compile Kernel
        run: |
          cd source
          export PATH=$(pwd)/../toolchain/bin:$PATH
          make ARCH=arm64 O=out exynos9611-a51_defconfig
          make ARCH=arm64 O=out CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc)

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: KVM-Kernel-A51
          path: source/out/arch/arm64/boot/Image.gz-dtb
          
