name: Build KVM Kernel for A51
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Setup Build Environment
        run: |
          sudo apt update
          sudo apt install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev \
          gcc-multilib g++-multilib libc6-dev-i386 libncurses5-dev x11proto-core-dev libx11-dev \
          lib32z1-dev ccache libgl1-mesa-dev libxml2-utils xsltproc unzip bc python3 \
          python-is-python3 clang lld llvm gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Pull Source and Toolchain
        run: |
          git clone --depth=1 https://github.com/ianmacd/a51xx source
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 toolchain-clang

      - name: Fix Samsung Source and Enable KVM
        run: |
          cd source
          # Create the exact directory structures first
          mkdir -p include/linux
          mkdir -p drivers/kperfmon
          
          # Now create the dummy files
          touch include/linux/olog.pb.h
          touch drivers/kperfmon/olog.pb.h
          
          # Inject KVM configurations
          echo "CONFIG_KVM=y" >> arch/arm64/configs/exynos9611-a51_defconfig
          echo "CONFIG_VIRTUALIZATION=y" >> arch/arm64/configs/exynos9611-a51_defconfig
          echo "CONFIG_KVM_ARM_HOST=y" >> arch/arm64/configs/exynos9611-a51_defconfig

      - name: Compile Kernel
        run: |
          cd source
          # Find Clang bin directory automatically
          CLANG_BIN=$(find ../toolchain-clang -name "clang" | xargs dirname | head -n 1)
          export PATH=$CLANG_BIN:$PATH
          
          # Build arguments
          MAKE_ARGS="ARCH=arm64 \
                     O=out \
                     CC=clang \
                     CLANG_TRIPLE=aarch64-linux-gnu- \
                     CROSS_COMPILE=aarch64-linux-gnu- \
                     CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
                     LD=ld.lld \
                     AR=llvm-ar \
                     NM=llvm-nm \
                     OBJCOPY=llvm-objcopy \
                     OBJDUMP=llvm-objdump \
                     STRIP=llvm-strip"

          make $MAKE_ARGS clean
          make $MAKE_ARGS exynos9611-a51_defconfig
          make $MAKE_ARGS -j$(nproc)

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: KVM-Kernel-A51
          path: source/out/arch/arm64/boot/Image.gz-dtb
          
